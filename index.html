<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Preview Card</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="card">

    <div class="left">

        <picture>

            <source media="(max-width:768px)"
            srcset="image-product-mobile.jpg">

            <img src="image-product-desktop.jpg" alt="Perfume">

        </picture>

    </div>

    <div class="right">

        <span>PERFUME</span>

        <h1>
            Gabrielle
            Essence Eau
            De Parfum
        </h1>

        <p>
            A floral, solar and voluptuous interpretation composed by Olivier Polge,
            Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="price">

            <h2>$149.99</h2>

            <del>$169.99</del>

        </div>

        <button>

            <img src="icon-cart.svg" alt="">

            Add to Cart

        </button>

    </div>

</div>

</body>
</html>
